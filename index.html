<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildCheck SaaS - 실시간 토지 분석</title>
    <style>
        :root { --primary-color: #2563eb; }
        body { font-family: 'Pretendard', sans-serif; background: #f8fafc; padding: 20px; color: #334155; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h2 { text-align: center; color: var(--primary-color); margin-bottom: 25px; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #94a3b8; }
        #result { margin-top: 25px; display: none; }
        .card { border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; background: #fff; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .label { font-weight: 600; color: #64748b; }
        .loading { text-align: center; display: none; margin: 10px 0; color: var(--primary-color); }
    </style>
</head>
<body>

<div class="container">
    <h2>🏗️ BuildCheck SaaS</h2>
    <input type="text" id="addressInput" placeholder="지번 주소를 입력하세요 (예: 양구읍 중리 14-2)">
    <button id="searchBtn" onclick="processSearch()">분석 시작</button>
    <div id="loading" class="loading">데이터 분석 중...</div>

    <div id="result">
        <div class="card">
            <div class="row"><span class="label">📍 소재지</span> <span id="resAddr">-</span></div>
            <div class="row"><span class="label">📏 대지면적</span> <span id="resArea">-</span></div>
            <div class="row"><span class="label">🏢 용도지역</span> <span id="resZone">-</span></div>
            <div class="row"><span class="label">🛡️ 기타구역</span> <span id="resDistricts">-</span></div>
        </div>
    </div>
</div>

<script>
    // ⚠️ [필독] 발급받은 본인의 Vworld 키를 아래에 정확히 입력하세요.
    const VWORLD_KEY = 'DB92072F-017E-35C6-B7EA-29BC7D400F75'; 
    const DATA_GO_KEY = '2e9cbc4e5549de8512e71991fbef85902989c3765e378fb6bab222f40a6cfa0b';

    async function processSearch() {
        const addr = document.getElementById('addressInput').value;
        const btn = document.getElementById('searchBtn');
        const loading = document.getElementById('loading');
        const resultDiv = document.getElementById('result');

        if(!addr) return alert("주소를 입력해주세요.");

        btn.disabled = true;
        loading.style.display = 'block';
        resultDiv.style.display = 'none';

        try {
            // [STEP 1] Vworld API 연동
            const vworldUrl = `https://api.vworld.kr/req/address?service=address&request=getcoord&version=2.0&crs=epsg:4324&address=${encodeURIComponent(addr)}&refine=true&simple=false&format=json&type=parcel&key=${VWORLD_KEY}`;
            const vResponse = await fetch(vworldUrl);
            const vData = await vResponse.json();

            if (vData.response.status !== "OK") throw new Error("Vworld: 주소를 찾을 수 없거나 인증 오류입니다.");
            const pnu = vData.response.refined.structure.pnu;

            // [STEP 2] 공공데이터 API 연동 (1613000 버전)
            const landUrl = `https://apis.data.go.kr/1613000/arLandUseInfoService/getLuInfo?serviceKey=${DATA_GO_KEY}&pnu=${pnu}&_type=json`;
            const lResponse = await fetch(landUrl);
            const lData = await lResponse.json();

            // [STEP 3] 데이터 매핑
            const item = lData.response?.body?.items?.item || lData.fields?.[0];
            
            if(!item) throw new Error("토지 정보를 가져오지 못했습니다. (API 승인 대기 또는 키 오류)");

            document.getElementById('resAddr').innerText = addr;
            document.getElementById('resArea').innerText = (item.lndpclAr || item.area || "0") + " ㎡";
            document.getElementById('resZone').innerText = item.ladUseNm || item.useNm || "정보 없음";
            document.getElementById('resDistricts').innerText = item.etcLawNm || "해당 없음";

            resultDiv.style.display = 'block';
        } catch (error) {
            alert("⚠️ 에러: " + error.message);
            console.error(error);
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }
</script>
</body>
</html>
